<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Clover Study 🍀 - 로그인</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <meta name="theme-color" content="#10B981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Clover Study">
    <link rel="apple-touch-icon" href="/static/favicon.ico">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <meta name="theme-color" content="#10B981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Clover Study">
    <link rel="apple-touch-icon" href="/static/favicon.ico">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Clover Study 로그인 페이지입니다.">
    <meta name="author" content="Clover Study">
    <meta property="og:title" content="Clover Study 🍀 - 로그인">
    <meta property="og:description" content="Clover Study 로그인 페이지입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cloverstudy.net/login">
    <meta property="og:image" content="{{ url_for('static', filename='og-image.png') }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://cloverstudy.net/login">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gradient-to-br from-[#F0FFF4] to-[#E6FFFA] min-h-screen font-cute">
    <div class="max-w-[480px] mx-auto bg-white/60 min-h-screen shadow-xl relative">
        <!-- X 버튼 -->
        <div class="absolute top-4 right-4">
            <a href="/" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">✕</a>
        </div>
        
        <div class="p-6">
            <div class="text-center mb-12 mt-8">
                <a href="/" class="inline-block hover:opacity-80 transition-opacity">
                    <h2 class="text-2xl font-bold text-gray-800">Clover Study 🍀</h2>
                </a>
                <p class="text-sm text-gray-500 mt-2">공부 기록을 함께 나누는 플랫폼</p>
            </div>

            <div class="bg-white rounded-3xl shadow-lg p-6 mb-4 mt-8">
                <h3 class="text-lg font-bold text-gray-800 mb-6">로그인</h3>

                <!-- 일반 로그인 탭 -->
                <form id="local-login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
                        <input type="text" id="local-username" placeholder="아이디를 입력하세요" 
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호</label>
                        <input type="password" id="local-password" placeholder="비밀번호를 입력하세요" 
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-2xl transition-all">
                        로그인
                    </button>
                </form>

                <div class="divider mt-8 mb-10 text-gray-400 text-sm">또는</div>

                <!-- 구글 로그인 -->
                <div id="g_id_onload"
                     data-client_id="{{ google_client_id }}"
                     data-callback="handleGoogleSignIn">
                </div>
                <div class="g_id_signin mt-2" data-type="standard" data-size="large" data-theme="outline"></div>

                <div class="mt-6 p-4 bg-emerald-50 rounded-2xl border border-emerald-200">
                    <p class="text-center text-sm text-gray-700">
                        <span class="font-bold text-emerald-600">✨ 처음 가입하세요?</span><br>
                        <span class="text-xs text-gray-600 mt-1 block">위의 구글 로그인을 통해 회원가입을 진행할 수 있습니다.</span>
                    </p>
                </div>
            </div>

            <div class="text-center text-xs text-gray-400 mt-8">
                <p><a href="/privacy" class="hover:text-gray-600">개인정보처리방침</a> | 
                   <a href="/terms" class="hover:text-gray-600">이용약관</a></p>
            </div>
        </div>
    </div>

    <script>
        // 구글 로그인 콜백
        function handleGoogleSignIn(response) {
            const idToken = response.credential;
            
            // 로딩 상태
            const button = document.querySelector('.g_id_signin');
            if (button) button.style.opacity = '0.5';
            
            fetch('/auth/google/callback', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id_token: idToken
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === 'success') {
                    if (data.action === 'login') {
                        // 로그인 성공
                        localStorage.setItem('clover_study_user', JSON.stringify(data.user));
                        alert('로그인되었습니다!');
                        window.location.href = '/';
                    } else if (data.action === 'signup') {
                        // 회원가입 페이지로 이동
                        localStorage.setItem('signup_email', data.email);
                        window.location.href = '/signup';
                    }
                } else {
                    alert(data.reason || '로그인 실패');
                    if (button) button.style.opacity = '1';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('로그인 중 오류가 발생했습니다.');
                if (button) button.style.opacity = '1';
            });
        }

        // 일반 로그인 폼
        document.getElementById('local-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('local-username').value.trim();
            const password = document.getElementById('local-password').value;
            
            if (!username || !password) {
                alert('아이디와 비밀번호를 입력해주세요.');
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.message === 'success') {
                    localStorage.setItem('clover_study_user', JSON.stringify(data.user));
                    alert('로그인되었습니다!');
                    window.location.href = '/';
                } else {
                    alert(data.reason || '로그인 실패');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('로그인 중 오류가 발생했습니다.');
            }
        });

        // Google Sign-In 초기화
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: '{{ google_client_id }}',
                callback: handleGoogleSignIn
            });
        };
    </script>
</body>
</html>
