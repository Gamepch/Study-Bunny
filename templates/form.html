<div class="space-y-4">
    <!-- 카테고리 셀렉트 (커뮤니티 모드에서만 표시, JS로 제어) -->
    <select id="modal-category"
        class="w-full p-3.5 text-[15px] border border-gray-200 text-gray-700 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-300 bg-gray-50/50 appearance-none font-medium">
        <option value="공부기록">📚 공부기록</option>
        <option value="질문">🙋‍♀️ 질문</option>
        <option value="꿀팁">💡 꿀팁</option>
        <option value="잡담">🧡 잡담</option>
    </select>

    <input type="text" id="modal-title-input" placeholder="제목을 입력하세요"
        class="w-full p-4 text-lg font-bold border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-300 placeholder:font-normal">

    <label
        class="flex items-center justify-center w-full p-4 border-2 border-dashed border-emerald-200 rounded-2xl text-emerald-600 hover:bg-emerald-50 hover:border-emerald-300 transition-colors cursor-pointer group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 group-hover:scale-110 transition-transform"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="font-bold text-[15px]">사진 첨부 / 변경하기</span>
        <input type="file" id="modal-image-input" class="hidden" accept="image/*">
    </label>

    <div id="modal-preview-container" class="hidden relative mt-2">
        <img id="modal-preview-img" src=""
            class="w-full h-auto max-h-[250px] rounded-2xl object-cover border border-emerald-100">
        <button id="modal-preview-remove-btn"
            class="absolute top-3 right-3 bg-gray-900/60 text-white rounded-full p-1.5 hover:bg-red-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <textarea id="modal-content-input" placeholder="오늘의 공부는 어땠나요? 자유롭게 기록해보세요! 🍀"
        class="w-full p-4 text-[15px] leading-relaxed border border-gray-200 rounded-2xl min-h-[180px] resize-none focus:outline-none focus:ring-2 focus:ring-emerald-300"></textarea>
</div>
