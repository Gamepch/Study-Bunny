<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Study 🍀 - 학습자료</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="description" content="내신부터 수능까지, 전교 1등의 비밀 노트가 궁금해? 클터디가 알려주는 효과적인 공부법, 꿀팁, 시험 멘탈 관리법으로 오늘부터 성적 상승 곡선 그리자!">
    <meta property="og:title" content="Clover Study 🍀 - 학습자료">
    <meta property="og:description" content="내신부터 수능까지, 전교 1등의 비밀 노트가 궁금해? 클터디가 알려주는 효과적인 공부법, 꿀팁, 시험 멘탈 관리법으로 오늘부터 성적 상승 곡선 그리자!">
    <meta property="og:image" content="https://cloverstudy.net/static/clover-study-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://cloverstudy.net/static/clover-study-og.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Gowun Dodum', sans-serif; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9449716559355642"
     crossorigin="anonymous"></script>
</head>
<body class="bg-gradient-to-br from-[#F0FFF4] to-[#E6FFFA] min-h-screen">
    <div class="max-w-[480px] mx-auto bg-white/60 min-h-screen shadow-xl relative pb-10">
        <!-- Header -->
        <header class="p-4 bg-white sticky top-0 z-10 border-b border-emerald-50">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold text-emerald-400 cursor-pointer" onclick="location.href='/'">Clover Study 🍀</h1>
                    <p class="text-xs text-gray-400">학습 자료</p>
                </div>
                <button onclick="location.href='/'" class="text-emerald-400 hover:text-emerald-600 text-lg">
                    ✕
                </button>
            </div>
        </header>

        <!-- Blog Content -->
        <main class="px-4 py-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">📚 학습 자료</h2>
            <p class="text-gray-500 text-sm mb-6">공부에 도움이 되는 유용한 글들을 모았습니다.</p>

            <!-- Articles Grid -->
            <div class="space-y-4">
                {% for article in articles %}
                <article class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow cursor-pointer" onclick="location.href='/blog/{{ article.id }}'">
                    <div class="p-4">
                        <div class="flex items-start justify-between mb-2">
                            <span class="inline-block bg-emerald-100 text-emerald-700 text-xs font-semibold px-3 py-1 rounded-full">
                                {{ article.category }}
                            </span>
                            <span class="text-xs text-gray-400">{{ '%02d' % article.id }}</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 line-clamp-2">
                            {{ article.title }}
                        </h3>
                        <p class="text-sm text-gray-600 line-clamp-2">
                            {{ article.subtitle }}
                        </p>
                        <div class="mt-3 flex items-center text-xs text-gray-500">
                            <span>📖 읽기 시간: 약 5분</span>
                        </div>
                    </div>
                </article>
                {% endfor %}
            </div>

            <!-- Advertisement Space -->
            <div class="mt-8 p-4 bg-gray-100 rounded-lg text-center text-sm text-gray-500">
                <p>Google AdSense 광고 영역</p>
                <p class="text-xs mt-1">광고 배치 예정</p>
            </div>
        </main>

    </div>
</body>
</html>
