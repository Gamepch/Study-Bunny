<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Study 🍀 - 관리자 페이지</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="description" content="사이트 관리자용 대시보드입니다.">
    <meta name="author" content="Clover Study">
    <meta property="og:title" content="Clover Study 🍀 - 관리자 페이지">
    <meta property="og:description" content="사이트 관리자용 대시보드입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cloverstudy.net/admin">
    <meta property="og:image" content="{{ url_for('static', filename='og-image.png') }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://cloverstudy.net/admin">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .user-card {
            transition: all 0.2s ease;
        }
        .user-card:hover {
            box-shadow: 0 8px 16px rgba(52, 211, 153, 0.15);
            transform: translateY(-2px);
        }
        .profile-img-container {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 9999px;
            border: 2px solid #a7f3d0;
        }
        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .profile-img-container.empty {
            background-color: #d1fae5;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#F0FFF4] to-[#E6FFFA] min-h-screen">
    
    <div class="max-w-[480px] mx-auto bg-white/60 min-h-screen shadow-xl relative pb-10">
        
        <header class="p-4 bg-white sticky top-0 z-10 border-b border-emerald-50 flex items-center">
            <button onclick="history.back()" class="w-10 text-emerald-600 hover:text-emerald-700 transition-colors p-2 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="flex-1 text-center text-lg font-bold text-gray-700">관리자 페이지</h1>
            <div class="w-10"></div>
        </header>

        <main>
        <div class="mx-4 mt-6">
            <div class="bg-white rounded-3xl shadow-sm border border-emerald-100 p-6 mb-6">
                <h2 class="text-lg font-bold text-gray-800 mb-2">📊 사이트 통계</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="text-3xl font-bold text-emerald-500" id="user-count">0</div>
                        <p class="text-sm text-gray-500 mt-1">총 가입 사용자</p>
                    </div>
                    <div>
                        <div class="text-3xl font-bold text-red-500" id="report-count">0</div>
                        <p class="text-sm text-gray-500 mt-1">신고 대기</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 mb-4">
                <button id="tab-users" onclick="switchAdminTab('users')" class="flex-1 py-3 px-4 bg-emerald-500 text-white rounded-2xl text-sm font-bold transition-all">
                    👥 사용자 목록
                </button>
                <button id="tab-reports" onclick="switchAdminTab('reports')" class="flex-1 py-3 px-4 bg-gray-100 text-gray-600 rounded-2xl text-sm font-bold transition-all">
                    🚨 신고 관리
                </button>
            </div>

            <div id="users-section" class="block">
                <h3 class="text-sm font-bold text-gray-700 mb-4">👥 가입한 사용자 목록</h3>
                <div id="users-container" class="space-y-3">
                    <div class="text-center py-8 text-gray-600">
                        <span class="text-2xl block mb-2">⏳</span>
                        사용자 목록을 불러오고 있습니다...
                    </div>
                </div>
            </div>

            <div id="reports-section" style="display: none;" class="block">
                <h3 class="text-sm font-bold text-gray-700 mb-4">🚨 신고 목록</h3>
                <div id="reports-container" class="space-y-3">
                    <div class="text-center py-8 text-gray-600">
                        <span class="text-2xl block mb-2">⏳</span>
                        신고 목록을 불러오고 있습니다...
                    </div>
                </div>
            </div>
        </div>

        <footer class="px-4 py-6 border-t border-gray-200 bg-gray-100 text-xs text-gray-500 mt-auto">
            <div class="max-w-[480px] mx-auto text-center">
                <p class="text-xs">관리자 권한으로 접근한 페이지입니다.</p>
            </div>
        </footer>
        </main>
    </div>

    <!-- 유저 상세 모달 -->
    <div id="user-detail-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4" style="display: none;">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm mx-auto overflow-hidden flex flex-col" style="max-height: 85vh;">
            <div class="p-5 border-b border-gray-100 flex items-center gap-3">
                <div class="profile-img-container" id="detail-profile-img-wrap">
                    <img id="detail-profile-img" src="" alt="프로필" onerror="this.parentElement.classList.add('empty'); this.style.display='none';">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="font-bold text-gray-800 truncate" id="detail-nickname"></p>
                    <p class="text-xs text-gray-500 truncate" id="detail-username"></p>
                </div>
                <button onclick="closeUserDetail()" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="overflow-y-auto flex-1">
                <div class="p-5 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-emerald-50 rounded-2xl p-3">
                            <p class="text-[10px] font-bold text-emerald-600 mb-1">📅 가입일</p>
                            <p class="text-xs font-bold text-gray-700" id="detail-created-at">-</p>
                        </div>
                        <div class="bg-blue-50 rounded-2xl p-3">
                            <p class="text-[10px] font-bold text-blue-600 mb-1">🕐 마지막 로그인</p>
                            <p class="text-xs font-bold text-gray-700" id="detail-last-login">-</p>
                        </div>
                        <div class="bg-purple-50 rounded-2xl p-3">
                            <p class="text-[10px] font-bold text-purple-600 mb-1">✍️ 작성 글 수</p>
                            <p class="text-xl font-bold text-gray-800" id="detail-post-count">-</p>
                        </div>
                        <div class="bg-red-50 rounded-2xl p-3">
                            <p class="text-[10px] font-bold text-red-500 mb-1">🚨 신고 횟수</p>
                            <p class="text-xl font-bold text-gray-800" id="detail-report-count">-</p>
                        </div>
                    </div>

                    <div class="bg-gray-50 rounded-2xl p-3">
                        <p class="text-[10px] font-bold text-gray-500 mb-1">📧 이메일</p>
                        <p class="text-xs text-gray-700 break-all" id="detail-email">-</p>
                    </div>

                    <!-- 클로버 물주기 -->
                    <div class="bg-emerald-50 rounded-2xl p-4">
                        <p class="text-xs font-bold text-emerald-700 mb-3">🍀 클로버 물주기</p>
                        <div class="grid grid-cols-3 gap-2 mb-3 text-center">
                            <div>
                                <p class="text-[10px] text-gray-500">단계</p>
                                <p class="text-sm font-bold text-gray-700" id="detail-clover-stage">-</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-500">누적 물</p>
                                <p class="text-sm font-bold text-gray-700" id="detail-clover-water">-</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-500">대기 중</p>
                                <p class="text-sm font-bold text-emerald-600" id="detail-clover-pending">-</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="give-water-amount" min="1" max="100" value="10"
                                class="flex-1 border border-emerald-200 rounded-xl px-3 py-2 text-sm text-center focus:outline-none focus:border-emerald-400">
                            <button onclick="giveWater()"
                                class="flex-1 py-2 bg-emerald-500 text-white text-xs font-bold rounded-xl hover:bg-emerald-600 transition active:scale-95">
                                💧 물 지급
                            </button>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs font-bold text-gray-700 mb-2">🚨 신고 이력</p>
                        <div id="detail-reports-list" class="space-y-2">
                            <div class="text-center py-4 text-gray-400 text-xs">불러오는 중...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 정지 모달 -->
    <div id="suspend-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4" style="display: none;">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-6 mx-auto">
            <h3 class="text-base font-bold text-gray-800 mb-1">🚫 계정 정지</h3>
            <p class="text-sm text-red-500 font-medium mb-4" id="suspend-target-label"></p>

            <div class="mb-4">
                <label class="text-xs font-bold text-gray-600 block mb-1.5">정지 사유 <span class="text-gray-400 font-normal">(선택)</span></label>
                <textarea id="suspend-reason-input" rows="3" placeholder="정지 사유를 입력하세요..."
                    class="w-full border border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-200"></textarea>
            </div>

            <div class="mb-5">
                <label class="text-xs font-bold text-gray-600 block mb-1.5">정지 기간 <span class="text-red-400">*</span></label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="selectDuration(1)" data-days="1" class="duration-btn py-2.5 text-xs font-bold border border-gray-200 rounded-xl text-gray-600 transition-all hover:border-red-300 hover:text-red-500">1일</button>
                    <button onclick="selectDuration(3)" data-days="3" class="duration-btn py-2.5 text-xs font-bold border border-gray-200 rounded-xl text-gray-600 transition-all hover:border-red-300 hover:text-red-500">3일</button>
                    <button onclick="selectDuration(7)" data-days="7" class="duration-btn py-2.5 text-xs font-bold border border-gray-200 rounded-xl text-gray-600 transition-all hover:border-red-300 hover:text-red-500">7일</button>
                    <button onclick="selectDuration(14)" data-days="14" class="duration-btn py-2.5 text-xs font-bold border border-gray-200 rounded-xl text-gray-600 transition-all hover:border-red-300 hover:text-red-500">14일</button>
                    <button onclick="selectDuration(30)" data-days="30" class="duration-btn py-2.5 text-xs font-bold border border-gray-200 rounded-xl text-gray-600 transition-all hover:border-red-300 hover:text-red-500">30일</button>
                    <button onclick="selectDuration(0)" data-days="0" class="duration-btn py-2.5 text-xs font-bold border border-gray-200 rounded-xl text-gray-600 transition-all hover:border-red-300 hover:text-red-500">영구</button>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="closeSuspendModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-2xl text-sm font-bold hover:bg-gray-200 transition">취소</button>
                <button onclick="confirmSuspend()" class="flex-1 py-3 bg-red-500 text-white rounded-2xl text-sm font-bold hover:bg-red-600 transition">정지하기</button>
            </div>
        </div>
    </div>

    <script>
        // Check admin access from server session
        async function checkAdminAccess() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                
                if (!data.authenticated) {
                    alert('로그인이 필요합니다.');
                    location.href = '/';
                    return false;
                }
                
                if (!data.user.is_admin) {
                    alert('관리자 권한이 필요합니다.');
                    location.href = '/';
                    return false;
                }
                
                return true;
            } catch (e) {
                console.error('Auth check error:', e);
                alert('인증 확인 중 오류가 발생했습니다.');
                location.href = '/';
                return false;
            }
        }

        // Load users
        async function loadUsers() {
            if (!await checkAdminAccess()) return;

            fetch('/api/admin/users')
                .then(response => {
                    console.log('Response status:', response.status);
                    if (response.status === 403) {
                        alert('관리자 권한이 필요합니다.');
                        location.href = '/';
                        throw new Error('Admin access denied');
                    }
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Users data:', data);
                    if (data && data.users) {
                        renderUsers(data.users);
                        loadReports();
                    } else {
                        throw new Error('No users data in response');
                    }
                })
                .catch(error => {
                    console.error('Error loading users:', error);
                    document.getElementById('users-container').innerHTML = `
                        <div class="text-center py-8 text-red-400">
                            <span class="text-2xl block mb-2">❌</span>
                            사용자 목록을 불러오지 못했습니다. (오류: ${error.message})
                        </div>
                    `;
                });
        }

        // Load reports
        async function loadReports() {
            if (!await checkAdminAccess()) return;

            fetch('/api/admin/reports?status=pending')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    console.log('Reports data:', data);
                    if (data && data.reports) {
                        renderReports(data.reports);
                    } else {
                        throw new Error('No reports data in response');
                    }
                })
                .catch(error => {
                    console.error('Error loading reports:', error);
                    document.getElementById('reports-container').innerHTML = `
                        <div class="text-center py-8 text-red-400">
                            <span class="text-2xl block mb-2">❌</span>
                            신고 목록을 불러오지 못했습니다.
                        </div>
                    `;
                });
        }

        // Switch admin tab
        function switchAdminTab(tab) {
            const usersSection = document.getElementById('users-section');
            const reportsSection = document.getElementById('reports-section');
            const usersTab = document.getElementById('tab-users');
            const reportsTab = document.getElementById('tab-reports');

            if (tab === 'users') {
                usersSection.style.display = 'block';
                reportsSection.style.display = 'none';
                usersTab.classList.add('bg-emerald-500', 'text-white');
                usersTab.classList.remove('bg-gray-100', 'text-gray-600');
                reportsTab.classList.add('bg-gray-100', 'text-gray-600');
                reportsTab.classList.remove('bg-emerald-500', 'text-white');
            } else {
                usersSection.style.display = 'none';
                reportsSection.style.display = 'block';
                reportsTab.classList.add('bg-emerald-500', 'text-white');
                reportsTab.classList.remove('bg-gray-100', 'text-gray-600');
                usersTab.classList.add('bg-gray-100', 'text-gray-600');
                usersTab.classList.remove('bg-emerald-500', 'text-white');
            }
        }

        // Render users
        function renderUsers(users) {
            const container = document.getElementById('users-container');
            const count = document.getElementById('user-count');

            count.textContent = users.length;

            if (users.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <span class="text-2xl block mb-2">🍀</span>
                        아직 가입한 사용자가 없습니다.
                    </div>
                `;
                return;
            }

            window._adminUsersMap = {};
            users.forEach(u => { window._adminUsersMap[u.username] = u; });

            container.innerHTML = users.map(user => `
                <div class="user-card bg-white rounded-2xl shadow-sm border ${user.is_suspended ? 'border-red-200 bg-red-50/30' : 'border-emerald-100'} p-4 flex items-center gap-3 cursor-pointer" id="user-card-${user.username}" onclick="openUserDetail('${user.username}')" data-username="${user.username}">
                    <div class="profile-img-container ${user.is_suspended ? 'opacity-50' : ''}">
                        <img src="${user.profile_url}" alt="프로필" onerror="this.parentElement.classList.add('empty'); this.style.display='none';">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <p class="font-bold ${user.is_suspended ? 'text-gray-400' : 'text-gray-800'} truncate">${user.nickname}</p>
                            ${user.username === 'admin' ? '<span class="px-2 py-1 bg-red-50 text-red-500 text-[10px] font-bold rounded-full">👑 관리자</span>' : ''}
                            ${user.is_suspended ? '<span class="px-2 py-1 bg-red-100 text-red-500 text-[10px] font-bold rounded-full">🚫 정지됨</span>' : ''}
                        </div>
                        <p class="text-xs text-gray-600 truncate">@${user.username}</p>
                        ${user.is_suspended ? `<p class="text-xs text-red-400 mt-0.5 truncate">
                            ${user.suspend_reason ? user.suspend_reason + ' · ' : ''}${user.suspend_until ? user.suspend_until.substring(0,10) + '까지' : '영구정지'}
                        </p>` : ''}
                    </div>
                    ${user.username !== 'admin' ? `
                    <button onclick="event.stopPropagation(); toggleSuspend('${user.username}', ${user.is_suspended})"
                        class="flex-shrink-0 px-3 py-1.5 text-xs font-bold rounded-xl transition-all ${user.is_suspended
                            ? 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'
                            : 'bg-red-50 text-red-500 hover:bg-red-100'}">
                        ${user.is_suspended ? '✅ 해제' : '🚫 정지'}
                    </button>` : ''}
                </div>
            `).join('');
        }

        // Render reports
        function renderReports(reports) {
            const container = document.getElementById('reports-container');
            const count = document.getElementById('report-count');

            count.textContent = reports.length;

            if (reports.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-600">
                        <span class="text-2xl block mb-2">✅</span>
                        처리할 신고가 없습니다.
                    </div>
                `;
                return;
            }

            container.innerHTML = reports.map(report => `
                <div class="bg-white rounded-2xl shadow-sm border border-red-100 p-4 cursor-pointer hover:shadow-md hover:border-red-200 transition-all" onclick="goToTarget(${report.target_id}, '${report.target_type}', ${report.post_id})" style="cursor: pointer;">
                    <div class="flex justify-between items-start gap-2 mb-3">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-bold text-red-600 mb-1">
                                ${report.target_type === 'post' ? '📝 게시물' : '💬 댓글'} 신고
                            </p>
                            <p class="text-sm font-bold text-gray-800">사유: ${report.reason}</p>
                            <p class="text-xs text-gray-500 mt-1">신고자: @${report.reporter_username}</p>
                            <p class="text-xs text-gray-500">대상: @${report.target_username}</p>
                            ${report.target_type === 'comment' && report.comment_content ? `
                                <div class="mt-2 p-2 bg-red-50 rounded-lg border-l-2 border-red-200">
                                    <p class="text-xs text-gray-600 font-medium mb-1">댓글 내용:</p>
                                    <p class="text-xs text-gray-700 break-words">${report.comment_content}</p>
                                </div>
                            ` : ''}
                            ${report.description ? `<p class="text-xs text-gray-600 mt-2 italic">추가 설명: ${report.description}</p>` : ''}
                            <p class="text-xs text-gray-600 mt-2">${report.created_at}</p>
                        </div>
                        <div class="flex gap-2 flex-shrink-0" onclick="event.stopPropagation();">
                            <button onclick="resolveReport(${report.id})" class="px-3 py-1 bg-green-50 text-green-600 text-xs font-bold rounded-lg hover:bg-green-100 transition">
                                해결
                            </button>
                            <button onclick="dismissReport(${report.id})" class="px-3 py-1 bg-gray-100 text-gray-600 text-xs font-bold rounded-lg hover:bg-gray-200 transition">
                                거절
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Go to target post or comment
        function goToTarget(targetId, targetType, postId) {
            if (targetType === 'post') {
                window.location.href = `/post/${targetId}`;
            } else if (targetType === 'comment') {
                // 댓글의 경우 해당 게시물로 이동
                window.location.href = `/post/${postId}`;
            }
        }

        // Resolve report
        function resolveReport(reportId) {
            if (confirm('이 신고를 해결 완료 처리하시겠어요?')) {
                updateReportStatus(reportId, 'resolved');
            }
        }

        // Dismiss report
        function dismissReport(reportId) {
            if (confirm('이 신고를 거절하시겠어요?')) {
                updateReportStatus(reportId, 'dismissed');
            }
        }

        // Update report status
        function updateReportStatus(reportId, status) {
            fetch(`/api/admin/reports/${reportId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    status: status 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message === 'success') {
                    alert('신고가 처리되었습니다.');
                    loadReports();
                } else {
                    alert('신고 처리에 실패했습니다.');
                }
            })
            .catch(error => {
                console.error('Error updating report:', error);
                alert('신고 처리 중 오류가 발생했습니다.');
            });
        }

        let suspendTargetUsername = null;
        let suspendDuration = null;

        function toggleSuspend(username, isSuspended) {
            if (isSuspended) {
                if (!confirm(`@${username} 유저의 정지를 해제하시겠어요?`)) return;
                callToggleSuspend(username, null, null);
                return;
            }
            suspendTargetUsername = username;
            suspendDuration = null;
            document.getElementById('suspend-target-label').textContent = `@${username}`;
            document.getElementById('suspend-reason-input').value = '';
            document.querySelectorAll('.duration-btn').forEach(btn => {
                btn.classList.remove('bg-red-500', 'text-white', 'border-red-500');
                btn.classList.add('border-gray-200', 'text-gray-600');
            });
            document.getElementById('suspend-modal').style.display = 'flex';
        }

        function selectDuration(days) {
            suspendDuration = days;
            document.querySelectorAll('.duration-btn').forEach(btn => {
                const isSelected = parseInt(btn.dataset.days) === days;
                btn.classList.toggle('bg-red-500', isSelected);
                btn.classList.toggle('text-white', isSelected);
                btn.classList.toggle('border-red-500', isSelected);
                btn.classList.toggle('text-gray-600', !isSelected);
                btn.classList.toggle('border-gray-200', !isSelected);
            });
        }

        function closeSuspendModal() {
            document.getElementById('suspend-modal').style.display = 'none';
            suspendTargetUsername = null;
            suspendDuration = null;
        }

        async function confirmSuspend() {
            if (suspendDuration === null) {
                alert('정지 기간을 선택해주세요.');
                return;
            }
            const reason = document.getElementById('suspend-reason-input').value.trim();
            await callToggleSuspend(suspendTargetUsername, reason, suspendDuration);
            closeSuspendModal();
        }

        async function callToggleSuspend(username, reason, days) {
            try {
                const res = await fetch(`/api/admin/users/${username}/toggle-suspend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, days })
                });
                const data = await res.json();
                if (data.message === 'success') {
                    loadUsers();
                } else {
                    alert(data.reason || '처리에 실패했습니다.');
                }
            } catch (e) {
                alert('오류가 발생했습니다.');
            }
        }

        function openUserDetail(username) {
            const user = (window._adminUsersMap || {})[username];
            if (!user) return;
            const modal = document.getElementById('user-detail-modal');
            const img = document.getElementById('detail-profile-img');
            const imgWrap = document.getElementById('detail-profile-img-wrap');

            img.src = user.profile_url || '';
            imgWrap.classList.remove('empty');
            img.style.display = '';
            document.getElementById('detail-nickname').textContent = user.nickname || user.username;
            document.getElementById('detail-username').textContent = '@' + user.username;
            document.getElementById('detail-created-at').textContent = user.created_at ? user.created_at.substring(0, 10) : '정보 없음';
            document.getElementById('detail-last-login').textContent = user.last_login ? user.last_login.substring(0, 16) : '정보 없음';
            document.getElementById('detail-post-count').textContent = user.post_count ?? '-';
            document.getElementById('detail-report-count').textContent = user.report_count ?? '-';
            document.getElementById('detail-email').textContent = user.email || '정보 없음';
            document.getElementById('detail-reports-list').innerHTML = '<div class="text-center py-4 text-gray-400 text-xs">불러오는 중...</div>';

            // 클로버 상태 초기화
            document.getElementById('detail-clover-stage').textContent = '...';
            document.getElementById('detail-clover-water').textContent = '...';
            document.getElementById('detail-clover-pending').textContent = '...';
            document.getElementById('give-water-amount').value = 10;
            modal._targetUsername = user.username;

            modal.style.display = 'flex';

            fetch(`/api/admin/users/${user.username}/detail`)
                .then(r => r.json())
                .then(data => {
                    // 클로버 상태
                    const stageNames = ['씨앗🌱','새싹🌿','어린☘️','클로버🍀','네잎✨🍀'];
                    const c = data.clover || {};
                    document.getElementById('detail-clover-stage').textContent = stageNames[c.stage ?? 0];
                    document.getElementById('detail-clover-water').textContent = (c.water_count ?? 0) + '회';
                    document.getElementById('detail-clover-pending').textContent = (c.pending_water ?? 0) + '회';

                    // 신고 이력
                    const list = document.getElementById('detail-reports-list');
                    if (!data.reports || data.reports.length === 0) {
                        list.innerHTML = '<div class="text-center py-4 text-gray-400 text-xs">신고 이력이 없습니다.</div>';
                        return;
                    }
                    const statusLabel = { pending: '⏳ 대기', resolved: '✅ 해결', dismissed: '❌ 거절' };
                    const statusColor = { pending: 'text-yellow-600 bg-yellow-50', resolved: 'text-green-600 bg-green-50', dismissed: 'text-gray-500 bg-gray-100' };
                    list.innerHTML = data.reports.map(r => `
                        <div class="border border-gray-100 rounded-xl p-3">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-[10px] font-bold ${statusColor[r.status] || 'text-gray-500 bg-gray-100'} px-2 py-0.5 rounded-full">
                                    ${statusLabel[r.status] || r.status}
                                </span>
                                <span class="text-[10px] text-gray-400">${r.created_at ? r.created_at.substring(0, 10) : ''}</span>
                            </div>
                            <p class="text-xs font-bold text-gray-700">${r.target_type === 'post' ? '📝 게시물' : '💬 댓글'} · ${r.reason}</p>
                            ${r.description ? `<p class="text-[11px] text-gray-500 mt-1">${r.description}</p>` : ''}
                        </div>
                    `).join('');
                })
                .catch(() => {
                    document.getElementById('detail-reports-list').innerHTML = '<div class="text-center py-4 text-red-400 text-xs">신고 이력을 불러오지 못했습니다.</div>';
                });
        }

        function closeUserDetail() {
            document.getElementById('user-detail-modal').style.display = 'none';
        }

        async function giveWater() {
            const modal = document.getElementById('user-detail-modal');
            const username = modal._targetUsername;
            const amount = parseInt(document.getElementById('give-water-amount').value);
            if (!username || isNaN(amount) || amount <= 0) return;

            const btn = event.currentTarget;
            btn.disabled = true;
            btn.textContent = '지급 중...';

            try {
                const res = await fetch(`/api/admin/users/${username}/give-water`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount }),
                });
                const data = await res.json();
                if (!res.ok) { alert(data.reason || '실패'); return; }

                const stageNames = ['씨앗🌱','새싹🌿','어린☘️','클로버🍀','네잎✨🍀'];
                document.getElementById('detail-clover-stage').textContent = stageNames[data.stage ?? 0];
                document.getElementById('detail-clover-water').textContent = (data.water_count ?? 0) + '회';
                document.getElementById('detail-clover-pending').textContent = (data.pending_water ?? 0) + '회';
                btn.textContent = '✅ 지급 완료!';
                setTimeout(() => { btn.textContent = '💧 물 지급'; btn.disabled = false; }, 1500);
            } catch(e) {
                alert('오류가 발생했어요.');
                btn.textContent = '💧 물 지급';
                btn.disabled = false;
            }
        }

        document.getElementById('user-detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeUserDetail();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
        });
    </script>
</body>
</html>
