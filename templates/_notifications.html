<div id="notifications-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-center p-4" style="z-index:9999;">
    <div class="bg-white rounded-3xl w-full max-w-[400px] shadow-2xl flex flex-col" style="position:relative; z-index:10000; max-height:80vh; overflow:hidden;">
        <div class="p-6 border-b border-emerald-50 flex justify-between items-center flex-shrink-0">
            <h2 class="text-lg font-bold text-gray-800">알림</h2>
            <div class="flex items-center gap-2">
                <button type="button" id="notifications-read-all-btn" onclick="markAllNotificationsRead()" class="text-[11px] text-emerald-500 font-bold hover:text-emerald-700 px-2 py-1 rounded-lg hover:bg-emerald-50">모두 읽음</button>
                <button type="button" onclick="closeNotificationsModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-emerald-100 hover:text-emerald-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
        <div id="notifications-list" class="overflow-y-auto flex-1 p-3 space-y-2" style="overflow-y:auto; max-height:calc(80vh - 100px);">
            <div class="text-center text-gray-400 text-xs py-10">알림을 불러오는 중...</div>
        </div>
    </div>
</div>
