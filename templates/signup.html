<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Clover Study 🍀 - 회원가입</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="description" content="Clover Study 회원가입 페이지입니다.">
    <meta name="author" content="Clover Study">
    <meta property="og:title" content="Clover Study 🍀 - 회원가입">
    <meta property="og:description" content="Clover Study 회원가입 페이지입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cloverstudy.net/signup">
    <meta property="og:image" content="{{ url_for('static', filename='og-image.png') }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://cloverstudy.net/signup">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gradient-to-br from-[#F0FFF4] to-[#E6FFFA] min-h-screen font-cute">
    <div class="max-w-[480px] mx-auto bg-white/60 min-h-screen shadow-xl relative">
        <!-- X 버튼 -->
        <div class="absolute top-4 right-4">
            <a href="/" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">✕</a>
        </div>
        
        <div class="p-6">
            <div class="text-center mb-12 mt-8">
                <a href="/" class="inline-block hover:opacity-80 transition-opacity">
                    <h2 class="text-2xl font-bold text-gray-800">Clover Study 🍀</h2>
                </a>
                <p class="text-sm text-gray-500 mt-2">공부 기록을 함께 나누는 플랫폼</p>
            </div>

            <div class="bg-white rounded-3xl shadow-lg p-6 mb-4 mt-8">
                <h3 class="text-lg font-bold text-gray-800 mb-6">회원가입</h3>
                <form id="signup-form" class="space-y-4" novalidate>
                    
                    <!-- 이메일 (읽기 전용) -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">이메일</label>
                        <input type="email" id="email" disabled 
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl bg-gray-100 text-gray-500 cursor-not-allowed">
                        <p class="text-xs text-gray-400 mt-1">✓ 구글 인증으로 확인됨</p>
                    </div>

                    <!-- 아이디 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
                        <input type="text" id="username" placeholder="사용할 아이디를 입력하세요 (3-20글자)" 
                               maxlength="20"
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-colors"
                               required>
                        <p class="text-xs text-gray-400 mt-1">영문자, 숫자, 언더스코어(_)만 사용 가능합니다</p>
                        <div id="username-check" class="text-xs mt-1 hidden"></div>
                    </div>

                    <!-- 비밀번호 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호</label>
                        <input type="password" id="password" placeholder="8자 이상의 비밀번호를 입력하세요" 
                               minlength="8"
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-colors"
                               required>
                        <p class="text-xs text-gray-400 mt-1">최소 8자 이상이어야 합니다</p>
                    </div>

                    <!-- 비밀번호 확인 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호 확인</label>
                        <input type="password" id="password-confirm" placeholder="비밀번호를 다시 입력하세요" 
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-colors"
                               required>
                        <div id="password-check" class="text-xs mt-1 hidden"></div>
                    </div>

                    <!-- 닉네임 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">닉네임</label>
                        <input type="text" id="nickname" placeholder="커뮤니티에서 보일 닉네임" 
                               maxlength="15"
                               class="w-full px-4 py-3 border-2 border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-colors"   >
                        <p class="text-xs text-gray-400 mt-1">나중에 변경 가능합니다</p>
                    </div>

                    <!-- 약관 동의 -->
                    <div class="bg-emerald-50 rounded-2xl p-4 mt-6">
                        <label class="flex items-start cursor-pointer">
                            <input type="checkbox" id="terms-agree" class="mt-1 rounded" required>
                            <span class="ml-2 text-sm text-gray-700">
                                <a href="/terms" target="_blank" class="text-emerald-600 font-bold hover:text-emerald-700">이용약관</a>과 
                                <a href="/privacy" target="_blank" class="text-emerald-600 font-bold hover:text-emerald-700">개인정보처리방침</a>에 동의합니다
                            </span>
                        </label>
                    </div>

                    <!-- 제출 버튼 -->
                    <button type="submit" id="submit-btn"
                            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-2xl transition-all mt-6">
                        가입 완료
                    </button>
                </form>

                <p class="text-center text-sm text-gray-600 mt-6">
                    이미 계정이 있으신가요? 
                    <a href="/login" class="text-emerald-500 font-bold hover:text-emerald-600">로그인</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // 페이지 로드 시 이메일 가져오기
        window.addEventListener('load', () => {
            const email = localStorage.getItem('signup_email');
            if (!email) {
                alert('잘못된 접근입니다. 구글 인증을 통해 회원가입을 진행해주세요.');
                window.location.href = '/login';
                return;
            }
            document.getElementById('email').value = email;
            document.getElementById('email-display').textContent = email;
        });

        // 아이디 유효성 검사
        document.getElementById('username').addEventListener('input', (e) => {
            const username = e.target.value;
            const checkDiv = document.getElementById('username-check');
            
            if (!username) {
                checkDiv.classList.add('hidden');
                return;
            }
            
            // 영문자, 숫자, 언더스코어만 허용
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                checkDiv.textContent = '❌ 영문자, 숫자, 언더스코어(_)만 사용 가능합니다';
                checkDiv.className = 'text-xs text-red-500 mt-1';
                checkDiv.classList.remove('hidden');
                return;
            }
            
            if (username.length < 3) {
                checkDiv.textContent = '❌ 최소 3자 이상이어야 합니다';
                checkDiv.className = 'text-xs text-red-500 mt-1';
                checkDiv.classList.remove('hidden');
            } else {
                checkDiv.textContent = '✓ 사용 가능한 아이디입니다';
                checkDiv.className = 'text-xs text-emerald-500 mt-1';
                checkDiv.classList.remove('hidden');
            }
            
            validateForm();
        });

        // 비밀번호 확인
        document.getElementById('password-confirm').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            const confirm = e.target.value;
            const checkDiv = document.getElementById('password-check');
            
            if (!confirm) {
                checkDiv.classList.add('hidden');
                return;
            }
            
            if (password === confirm) {
                checkDiv.textContent = '✓ 비밀번호가 일치합니다';
                checkDiv.className = 'text-xs text-emerald-500';
                checkDiv.classList.remove('hidden');
            } else {
                checkDiv.textContent = '❌ 비밀번호가 일치하지 않습니다';
                checkDiv.className = 'text-xs text-red-500';
                checkDiv.classList.remove('hidden');
            }
            
            validateForm();
        });

        // 폼 유효성 검사
        function validateForm() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;
            const terms = document.getElementById('terms-agree').checked;
            
            const isValid = username.length >= 3 && 
                          /^[a-zA-Z0-9_]+$/.test(username) &&
                          password.length >= 8 && 
                          password === confirm && 
                          terms;
            
            // 버튼을 항상 클릭 가능하게 유지
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            
            return isValid;
        }

        document.getElementById('terms-agree').addEventListener('change', validateForm);
        document.getElementById('password').addEventListener('input', validateForm);

        // 폼 제출
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;
            const terms = document.getElementById('terms-agree').checked;
            
            // 조건 검사 및 경고
            if (!username) {
                alert('아이디를 입력해주세요');
                return;
            }
            if (username.length < 3) {
                alert('아이디는 최소 3자 이상이어야 합니다');
                return;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                alert('아이디는 영문자, 숫자, 언더스코어(_)만 사용 가능합니다');
                return;
            }
            if (!password) {
                alert('비밀번호를 입력해주세요');
                return;
            }
            if (password.length < 8) {
                alert('비밀번호는 최소 8자 이상이어야 합니다');
                return;
            }
            if (password !== confirm) {
                alert('비밀번호가 일치하지 않습니다');
                return;
            }
            if (!terms) {
                alert('이용약관과 개인정보처리방침에 동의해주세요');
                return;
            }
            
            const nickname = document.getElementById('nickname').value.trim() || '새로운 클로버';
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '가입 중...';
            
            try {
                const response = await fetch('/auth/google/complete-signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        nickname: nickname
                    })
                });
                
                const data = await response.json();
                
                if (data.message === 'success') {
                    localStorage.setItem('clover_study_user', JSON.stringify(data.user));
                    localStorage.removeItem('signup_email');
                    alert('회원가입이 완료되었습니다! 🎉');
                    window.location.href = '/';
                } else {
                    alert(data.reason || '회원가입 실패');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '가입 완료';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('회원가입 중 오류가 발생했습니다.');
                submitBtn.disabled = false;
                submitBtn.textContent = '가입 완료';
            }
        });
    </script>
</body>
</html>
